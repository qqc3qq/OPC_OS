appId: com.ceo-os.desktop
productName: CEO OS
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - node_modules/sql.js/**/*
asarUnpack:
  - node_modules/sql.js/**/*
win:
  target:
    - target: nsis
      arch: [x64]
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  include: resources/installer.nsh
