appId: com.ceo-os.desktop
productName: CEO OS
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - node_modules/sql.js/**/*
  - node_modules/electron-updater/**/*
  - node_modules/builder-util-runtime/**/*
asarUnpack:
  - node_modules/sql.js/**/*
  - node_modules/electron-updater/**/*
  - node_modules/builder-util-runtime/**/*
win:
  target:
    - target: nsis
      arch: [x64]
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  include: resources/installer.nsh
publish:
  provider: github
  owner: qqc3qq
  repo: OPC_OS
