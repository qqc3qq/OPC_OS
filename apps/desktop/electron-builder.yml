appId: com.ceo-os.desktop
productName: CEO OS
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - "!node_modules/**/*"
extraResources: []
win:
  target: nsis
  icon: resources/icon.ico
mac:
  target: dmg
  icon: resources/icon.icns
linux:
  target: AppImage
  icon: resources/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
