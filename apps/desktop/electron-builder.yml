appId: com.ceo-os.desktop
productName: CEO OS
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - "!node_modules/**/*"
extraResources: []
win:
  target:
    - target: nsis
      arch: [x64]
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
