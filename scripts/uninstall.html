<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEO OS - Uninstaller</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', 'SF Pro Display', 'Segoe UI', sans-serif;
    background: #09090b;
    color: #fafafa;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    width: 480px;
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 16px;
    padding: 40px;
    text-align: center;
  }
  .icon {
    width: 64px; height: 64px;
    background: #3b82f6;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 28px;
  }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  p.desc { color: #a1a1aa; font-size: 14px; margin-bottom: 28px; line-height: 1.5; }
  .items {
    background: #09090b;
    border: 1px solid #27272a;
    border-radius: 12px;
    padding: 8px;
    margin-bottom: 24px;
    text-align: left;
  }
  .item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
  }
  .item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .item .path { color: #a1a1aa; font-size: 11px; margin-top: 2px; }
  .progress { display: none; margin-bottom: 20px; }
  .progress-bar {
    height: 4px; background: #27272a; border-radius: 2px; overflow: hidden;
  }
  .progress-bar .fill {
    height: 100%; background: #3b82f6; border-radius: 2px;
    width: 0%; transition: width 0.3s;
  }
  .progress-text { font-size: 12px; color: #a1a1aa; margin-top: 8px; }
  .buttons { display: flex; gap: 12px; }
  button {
    flex: 1; padding: 12px;
    border-radius: 10px; border: none;
    font-size: 14px; font-weight: 500; cursor: pointer;
    transition: all 0.15s;
  }
  .btn-uninstall { background: #ef4444; color: white; }
  .btn-uninstall:hover { background: #dc2626; }
  .btn-uninstall:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-cancel { background: #27272a; color: #a1a1aa; }
  .btn-cancel:hover { background: #3f3f46; color: #fafafa; }
  .status { margin-top: 16px; font-size: 13px; min-height: 20px; }
  .status.success { color: #10b981; }
  .status.error { color: #ef4444; }
  .logo { font-size: 13px; color: #52525b; margin-top: 32px; }
</style>
</head>
<body>
<div class="container">
  <div class="icon">&#9889;</div>
  <h1>Uninstall CEO OS</h1>
  <p class="desc">This will remove CEO OS and all local data from your computer. This action cannot be undone.</p>

  <div class="items" id="items">
    <div class="item">
      <span class="dot" style="background:#3b82f6"></span>
      <div>
        Program Files
        <div class="path" id="appPath">Detecting...</div>
      </div>
    </div>
    <div class="item">
      <span class="dot" style="background:#10b981"></span>
      <div>
        User Data &amp; Settings
        <div class="path" id="dataPath">Detecting...</div>
      </div>
    </div>
    <div class="item">
      <span class="dot" style="background:#f59e0b"></span>
      <div>
        Local Database
        <div class="path" id="dbPath">Detecting...</div>
      </div>
    </div>
  </div>

  <div class="progress" id="progress">
    <div class="progress-bar"><div class="fill" id="fill"></div></div>
    <div class="progress-text" id="progressText">Preparing...</div>
  </div>

  <div class="buttons" id="buttons">
    <button class="btn-cancel" onclick="window.close()">Cancel</button>
    <button class="btn-uninstall" id="uninstallBtn" onclick="uninstall()">Uninstall</button>
  </div>

  <div class="status" id="status"></div>
  <div class="logo">CEO OS v0.0.1</div>
</div>

<script>
const { exec } = require('child_process');
const fs = require('fs');
const path = require('path');
const os = require('os');

const appPaths = [
  path.join(os.homedir(), 'AppData', 'Local', 'Programs', 'CEO OS'),
  path.join(process.env['ProgramFiles'] || 'C:\\Program Files', 'CEO OS'),
];

const dataPaths = [
  path.join(os.homedir(), 'AppData', 'Roaming', 'CEO OS'),
  path.join(os.homedir(), 'AppData', 'Roaming', 'ceo-os'),
];

const dbPaths = [
  path.join(os.homedir(), 'ceo-os.db'),
  path.join(os.homedir(), 'AppData', 'Roaming', 'ceo-os.db'),
];

function exists(p) { try { return fs.existsSync(p); } catch(e) { return false; } }
function rm(p) {
  try {
    if (fs.statSync(p).isDirectory()) fs.rmSync(p, { recursive: true, force: true });
    else fs.unlinkSync(p);
    return true;
  } catch(e) { return false; }
}

// Detect existing paths
document.getElementById('appPath').textContent = appPaths.find(exists) || 'Not found';
document.getElementById('dataPath').textContent = dataPaths.find(exists) || 'Not found';
document.getElementById('dbPath').textContent = dbPaths.find(exists) || 'Not found';

async function uninstall() {
  const btn = document.getElementById('uninstallBtn');
  const progress = document.getElementById('progress');
  const fill = document.getElementById('fill');
  const progressText = document.getElementById('progressText');
  const status = document.getElementById('status');
  const items = document.getElementById('items');
  const buttons = document.getElementById('buttons');

  btn.disabled = true;
  progress.style.display = 'block';
  buttons.style.display = 'none';

  const allPaths = [...appPaths, ...dataPaths, ...dbPaths];
  const existing = allPaths.filter(exists);
  const total = existing.length;

  let removed = 0;
  for (const p of existing) {
    progressText.textContent = 'Removing: ' + p;
    fill.style.width = (removed / total * 100) + '%';
    await new Promise(r => setTimeout(r, 400));
    if (rm(p)) removed++;
    fill.style.width = ((removed + 1) / total * 100) + '%';
  }

  fill.style.width = '100%';
  progressText.textContent = 'Complete';
  items.style.display = 'none';
  status.className = 'status success';
  status.textContent = 'CEO OS has been uninstalled. You can close this window.';
}
</script>
</body>
</html>
